---
- name: Ubuntu Server Hardening
  hosts: all
  become: true

  vars:
    ssh_port: 22

  tasks:

    - name: Install required security packages
      apt:
        update_cache: yes
        name:
          - openssh-server
          - sudo
          - auditd
          - ufw
          - chrony
          - rsyslog
          - aide
          - apparmor
          - apparmor-utils
          - unattended-upgrades
          - vim
        state: present

    - name: Enable AppArmor
      service:
        name: apparmor
        enabled: true
        state: started

    - name: Enable UFW
      ufw:
        state: enabled

    - name: Allow SSH
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Enable auditd
      service:
        name: auditd
        enabled: true
        state: started

    - name: Enable chrony
      service:
        name: chrony
        enabled: true
        state: started

    - name: Enable rsyslog
      service:
        name: rsyslog
        enabled: true
        state: started

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'

    - name: Configure SSH timeout
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'

    - name: Configure SSH max timeout count
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: 'ClientAliveCountMax 0'

    - name: Restart SSH
      service:
        name: ssh
        state: restarted

    - name: Apply kernel hardening parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        reload: true
        state: present
      loop:
        - { name: net.ipv4.ip_forward, value: '0' }
        - { name: net.ipv4.conf.all.accept_redirects, value: '0' }
        - { name: net.ipv4.conf.default.accept_redirects, value: '0' }
        - { name: net.ipv4.conf.all.send_redirects, value: '0' }
        - { name: net.ipv4.conf.default.send_redirects, value: '0' }
        - { name: net.ipv4.conf.all.rp_filter, value: '1' }
        - { name: kernel.randomize_va_space, value: '2' }

    - name: Set minimum password length
      replace:
        path: /etc/security/pwquality.conf
        regexp: '^#?minlen.*'
        replace: 'minlen = 14'

    - name: Lock inactive accounts after 30 days
      command: useradd -D -f 30

    - name: Initialize AIDE database
      command: aideinit
      args:
        creates: /var/lib/aide/aide.db
