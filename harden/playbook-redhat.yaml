---
- name: RHEL Server Hardening
  hosts: all
  become: true

  vars:
    ssh_port: 22

  tasks:

    - name: Install required security packages
      dnf:
        name:
          - openssh-server
          - sudo
          - audit
          - firewalld
          - chrony
          - rsyslog
          - aide
          - policycoreutils
          - selinux-policy-targeted
          - vim-enhanced
          - bash-completion
        state: present

    - name: Ensure SELinux is enforcing
      selinux:
        policy: targeted
        state: enforcing

    - name: Enable and start firewalld
      service:
        name: firewalld
        enabled: true
        state: started

    - name: Allow SSH through firewall
      firewalld:
        service: ssh
        permanent: true
        immediate: true
        state: enabled

    - name: Enable auditd
      service:
        name: auditd
        enabled: true
        state: started

    - name: Enable chronyd
      service:
        name: chronyd
        enabled: true
        state: started

    - name: Enable rsyslog
      service:
        name: rsyslog
        enabled: true
        state: started

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'

    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'

    - name: Configure SSH idle timeout
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'

    - name: Configure SSH idle count
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: 'ClientAliveCountMax 0'

    - name: Restart SSH service
      service:
        name: sshd
        state: restarted

    - name: Apply kernel hardening parameters
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        reload: true
        state: present
      loop:
        - { name: net.ipv4.ip_forward, value: '0' }
        - { name: net.ipv4.conf.all.accept_redirects, value: '0' }
        - { name: net.ipv4.conf.default.accept_redirects, value: '0' }
        - { name: net.ipv4.conf.all.send_redirects, value: '0' }
        - { name: net.ipv4.conf.default.send_redirects, value: '0' }
        - { name: net.ipv4.conf.all.rp_filter, value: '1' }
        - { name: kernel.randomize_va_space, value: '2' }

    - name: Set password minimum length
      replace:
        path: /etc/security/pwquality.conf
        regexp: '^#?minlen.*'
        replace: 'minlen = 14'

    - name: Lock inactive accounts after 30 days
      command: useradd -D -f 30

    - name: Initialize AIDE database
      command: aide --init
      args:
        creates: /var/lib/aide/aide.db.gz
